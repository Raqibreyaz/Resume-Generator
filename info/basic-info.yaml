design:
  theme: sb2nov
  page:
    size: us-letter
    top_margin: 0.4cm
    bottom_margin: 0.4cm
    left_margin: 0.8cm
    right_margin: 0.8cm
    show_page_numbering: false
    show_last_updated_date: false
  colors:
    text: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    last_updated_date_and_page_numbering: rgb(128, 128, 128)
  text:
    font_family: New Computer Modern
    font_size: 10pt
    leading: 0.45em
    alignment: justified
    date_and_location_column_alignment: right
  links:
    underline: true
    use_external_link_icon: false
  header:
    name_font_family: New Computer Modern
    name_font_size: 25pt
    name_bold: true
    photo_width: 3.5cm
    vertical_space_between_name_and_connections: 0.3cm
    vertical_space_between_connections_and_first_section: 0.3cm
    horizontal_space_between_connections: 0.15cm
    connections_font_family: New Computer Modern
    separator_between_connections: '|'
    use_icons_for_connections: false
    use_urls_as_placeholders_for_connections: true
    make_connections_links: true
    alignment: center
  section_titles:
    type: with-full-line
    font_family: New Computer Modern
    font_size: 1.2em
    bold: true
    small_caps: false
    line_thickness: 0.8pt
    vertical_space_above: 0.55cm
    vertical_space_below: 0.2cm
  entries:
    date_and_location_width: 4.15cm
    left_and_right_margin: 0.3cm
    horizontal_space_between_columns: 0.1cm
    vertical_space_between_entries: 0.3cm
    allow_page_break_in_sections: true
    allow_page_break_in_entries: true
    short_second_row: false
    show_time_spans_in: []
  highlights:
    bullet: •
    top_margin: 0.25cm
    left_margin: 0cm
    vertical_space_between_highlights: 0.3cm
    horizontal_space_between_bullet_and_highlight: 0.3em
    summary_left_margin: 0cm
  entry_types:
    one_line_entry:
      template: '**LABEL:** DETAILS'
     
    # education_entry:
    #   # First line: Institution + Location + Date (aligned right)
    #   main_column_first_row_template: '**INSTITUTION** – *LOCATION*'
    #   date_and_location_column_template: '*DATE*'  # Date on the right side

    #   # Second line: Degree + Area of Study
    #   main_column_second_row_template: |- 
    #     '*DEGREE* in *AREA*'

    #   # Optional spacing and other controls (default shown)
    #   degree_column_width: 1cm

    # education_entry:
    #   main_column_first_row_template: '**INSTITUTION**, DEGREE in AREA -- LOCATION'
    #   degree_column_template:
    #   degree_column_width: 1cm
    #   main_column_second_row_template: |-
    #     SUMMARY
    #     HIGHLIGHTS
    #   date_and_location_column_template: DATE
    education_entry:
      main_column_first_row_template: '**INSTITUTION**\n\n*DEGREE* in *AREA*'
      date_and_location_column_template: '*LOCATION*\n\n*DATE*'  # Location and date on separate lines
      degree_column_width: 1cm

    normal_entry:
      main_column_first_row_template: 'NAME -- **LOCATION**'
      main_column_second_row_template: |-
        SUMMARY
        HIGHLIGHTS
      date_and_location_column_template: DATE
    experience_entry:
      main_column_first_row_template: '**POSITION**, COMPANY -- LOCATION'
      main_column_second_row_template: |-
        SUMMARY
        HIGHLIGHTS
      date_and_location_column_template: DATE
    publication_entry:
      main_column_first_row_template: '**TITLE**'
      main_column_second_row_template: |-
        AUTHORS
        URL (JOURNAL)
      main_column_second_row_without_journal_template: |-
        AUTHORS
        URL
      main_column_second_row_without_url_template: |-
        AUTHORS
        JOURNAL
      date_and_location_column_template: DATE

